<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Bar Sale - Smich Suites</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f5f1eb;
            color: #2c2c2c;
            padding: 30px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #3b2415, #5c3a24);
            color: white;
            padding: 35px 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 30px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .form-container {
            padding: 40px;
        }

        h3 {
            color: #3b2415;
            margin: 28px 0 12px;
            font-size: 20px;
            border-bottom: 2px solid #e0d5c0;
            padding-bottom: 8px;
        }

        /* Form Styling */
        form label {
            display: block;
            margin: 16px 0 8px;
            font-weight: 600;
            color: #3b2415;
            font-size: 15px;
        }

        form input,
        form select,
        form textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e0d5c0;
            border-radius: 10px;
            font-size: 16px;
            background-color: #fffaf5;
            transition: all 0.3s ease;
        }

        form input:focus,
        form select:focus,
        form textarea:focus {
            outline: none;
            border-color: #3b2415;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(59, 36, 21, 0.1);
        }

        /* Submit Button */
        button[type="submit"] {
            margin-top: 35px;
            width: 100%;
            background: #3b2415;
            color: white;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button[type="submit"]:hover {
            background: #2c1a10;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(59, 36, 21, 0.25);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #777;
            text-decoration: none;
            font-size: 15px;
        }

        .back-link:hover {
            color: #3b2415;
        }

        @media (max-width: 600px) {
            .container {
                margin: 10px;
            }
            .form-container {
                padding: 30px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- Header -->
        <div class="header">
            <h1>Create Bar Sale</h1>
            <p>Record a new bar sale or guest order</p>
        </div>

        <!-- Form -->
        <div class="form-container">
            <form method="POST">
                {% csrf_token %}

                <h3>Customer / Guest Information</h3>
                {{ sale_form.as_p }}

                <h3>Bar Item</h3>
                {{ item_form.as_p }}

                <button type="submit">Create Sale</button>
            </form>

            <a href="{% url 'bar:dashboard' %}" class="back-link">
                ← Back to Bar Dashboard
            </a>
        </div>

    </div>
</body>
</html>
