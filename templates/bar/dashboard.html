<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bar Dashboard - Smitch Suites</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f5f1eb;
            color: #2c2c2c;
            padding: 30px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #3b2415;
            font-size: 32px;
            margin-bottom: 20px;
        }

        /* Navigation */
        .nav-links {
            background: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.06);
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .nav-links a {
            color: #3b2415;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            background: #3b2415;
            color: white;
        }

        /* Statistics Cards */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 26px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-6px);
        }

        .stat-card h3 {
            color: #777;
            font-size: 14.5px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .stat-card h2 {
            color: #3b2415;
            font-size: 34px;
            font-weight: 700;
        }

        .sales-amount {
            color: #28a745;
        }

        .unpaid {
            color: #d9534f;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <h1>Bar Dashboard</h1>

        <!-- Navigation -->
        <div class="nav-links">
            <a href="{% url 'bar:bar_item_list' %}">Bar Items</a>
            <a href="{% url 'bar:create_sale' %}">+ Create Sale</a>
            <a href="{% url 'bar:sale_list' %}">View Sales</a>
            <a href="{% url 'bar:bar_report' %}">Bar Report</a>
        </div>

        <!-- Statistics -->
        <div class="stats">
            <div class="stat-card">
                <h3>Today’s Sales Count</h3>
                <h2>{{ sales_count_today }}</h2>
            </div>
            <div class="stat-card">
                <h3>Today’s Sales Amount</h3>
                <h2 class="sales-amount">₦{{ total_sales_today }}</h2>
            </div>
            <div class="stat-card">
                <h3>Unpaid Sales</h3>
                <h2 class="unpaid">{{ unpaid_sales }}</h2>
            </div>
            <div class="stat-card">
                <h3>Added to Room Bill</h3>
                <h2>{{ room_bill_sales }}</h2>
            </div>
        </div>

    </div>
</body>
</html>
