<!DOCTYPE html>
<html>
<head>
    <title>Create Cleaning Task</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f1eb;
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        h1 {
            color: #3b2415;
            margin-bottom: 10px;
        }

        p {
            color: #666;
        }

        form {
            margin-top: 25px;
        }

        form p {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 7px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 11px;
            border: 1px solid #ccc;
            border-radius: 7px;
            font-size: 15px;
            box-sizing: border-box;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        button {
            background: #8b5e34;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 7px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #6f4724;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #8b5e34;
            font-weight: bold;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .messages {
            margin-top: 15px;
        }

        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            background: #e7f6e7;
            color: #246324;
        }

        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Create Cleaning Task</h1>

    <p>
        Assign rooms to housekeeping staff for cleaning and inspection.
    </p>

    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Create Cleaning Task
        </button>

    </form>

    <a href="{% url 'housekeeping:cleaning_list' %}" class="back-link">
        ← Back to Cleaning Tasks
    </a>

</div>

</body>
</html>
