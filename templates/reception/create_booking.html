<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Booking - Smich Suites</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f5f1eb;
            color: #2c2c2c;
            padding: 30px;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        h1 {
            color: #3b2415;
            font-size: 32px;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 30px;
            font-size: 16px;
        }

        /* Messages */
        .messages {
            margin-bottom: 25px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Form Styling */
        form label {
            display: block;
            margin: 18px 0 8px;
            font-weight: 600;
            color: #3b2415;
            font-size: 15px;
        }

        form input,
        form select,
        form textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e0d5c0;
            border-radius: 10px;
            font-size: 16px;
            background-color: #fffaf5;
            transition: all 0.3s ease;
        }

        form input:focus,
        form select:focus,
        form textarea:focus {
            outline: none;
            border-color: #3b2415;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(59, 36, 21, 0.1);
        }

        /* Submit Button */
        button[type="submit"] {
            margin-top: 28px;
            width: 100%;
            background: #3b2415;
            color: white;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button[type="submit"]:hover {
            background: #2c1a10;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(59, 36, 21, 0.25);
        }

        /* Back Link */
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #777;
            text-decoration: none;
            font-size: 15px;
        }

        .back-link:hover {
            color: #3b2415;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
                margin: 10px;
            }
            h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create New Booking</h1>
        <p class="subtitle">Fill in guest and booking details</p>

        <!-- Messages -->
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <p class="message {% if message.tags %} {{ message.tags }} {% endif %}">
                        {{ message }}
                    </p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Create Booking</button>
        </form>

        <br>

        <a href="{% url 'reception:booking_list' %}">
            View All Bookings
        </a>
        <br>
        <a href="{% url 'reception:dashboard' %}" class="back-link">
            ← Back to Dashboard
        </a>
    </div>
</body>
</html>
