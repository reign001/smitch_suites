<!DOCTYPE html>
<html>
<head>
    <title>Create Room Service</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f1eb;
            padding: 30px;
        }

        .container {
            max-width: 760px;
            margin: auto;
            background: white;
            padding: 28px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        h1 {
            color: #3b2415;
        }

        form p {
            margin-bottom: 15px;
        }

        input, select, textarea {
            width: 100%;
            padding: 11px;
            border: 1px solid #ccc;
            border-radius: 7px;
        }

        input[type="checkbox"] {
            width: auto;
        }

        button, .button {
            background: #8b5e34;
            color: white;
            padding: 11px 15px;
            border: none;
            text-decoration: none;
            border-radius: 7px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Create Room Service Request</h1>
    <p>Select the guest currently checked in, then add the service requested.</p>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Save Room Service</button>
    </form>

    <br>
    <a href="{% url 'reception:room_service_list' %}" class="button">Back</a>
</div>

</body>
</html>
