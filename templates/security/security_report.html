<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Security Report - Smitch Suites</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f5f1eb;
            color: #2c2c2c;
            padding: 30px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #3b2415;
            font-size: 32px;
            margin-bottom: 20px;
        }

        /* Filter Bar */
        .filter-bar {
            background: white;
            padding: 20px 24px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.06);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .filter-bar label {
            font-weight: 600;
            color: #3b2415;
        }

        .filter-bar input[type="date"] {
            padding: 10px 14px;
            border: 1.5px solid #e0d5c0;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #3b2415;
            color: white;
        }

        .btn-primary:hover {
            background: #2c1a10;
        }

        .btn-pdf {
            background: #c28b45;
            color: white;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 8px;
        }

        .btn-pdf:hover {
            background: #3b2415;
        }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .summary-card {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            text-align: center;
        }

        .summary-card h3 {
            color: #777;
            font-size: 14.5px;
            margin-bottom: 8px;
        }

        .summary-card h2 {
            color: #3b2415;
            font-size: 32px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <h1>Security Report</h1>

        <!-- Filter & Download -->
        <div class="filter-bar">
            <form method="GET" style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
                <label>Date:</label>
                <input type="date" name="date" value="{{ selected_date }}">
                <button type="submit" class="btn btn-primary">Generate Report</button>
            </form>
            
            <a href="{% url 'security:download_security_report_pdf' %}?date={{ selected_date }}" 
               class="btn btn-pdf">
                📄 Download PDF
            </a>
        </div>

        <!-- Summary Statistics -->
        <div class="summary-grid">
            <div class="summary-card">
                <h3>Total Visitors</h3>
                <h2>{{ visitors.count }}</h2>
            </div>
            <div class="summary-card">
                <h3>Total Incidents</h3>
                <h2>{{ incidents.count }}</h2>
            </div>
            <div class="summary-card">
                <h3>Total Patrols</h3>
                <h2>{{ patrols.count }}</h2>
            </div>
            <div class="summary-card">
                <h3>Key/Card Logs</h3>
                <h2>{{ key_logs.count }}</h2>
            </div>
        </div>

    </div>
</body>
</html>
