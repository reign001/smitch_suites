<div class="module">
    <h1 style="color: #3b2415; margin-bottom: 24px; font-size: 28px;">Add New Staff</h1>

    <form method="POST" class="staff-form">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="submit-btn">
            Create Staff
        </button>
    </form>

    <br>
    <a href="{% url 'staff:staff_list' %}" class="back-link">
        ← Back to Staff List
    </a>
</div>

<style>
    .module {
    background: white;
    padding: 32px 40px;
    border-radius: 16px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.06);
    max-width: 600px;
    margin: 40px auto;
}

/* Form Styling */
.staff-form label {
    display: block;
    margin: 18px 0 8px;
    font-weight: 600;
    color: #3b2415;
    font-size: 15px;
}

.staff-form input,
.staff-form select,
.staff-form textarea {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #e0d5c0;
    border-radius: 8px;
    font-size: 16px;
    transition: all 0.3s ease;
    background-color: #fffaf5;
}

.staff-form input:focus,
.staff-form select:focus,
.staff-form textarea:focus {
    outline: none;
    border-color: #3b2415;
    background-color: white;
    box-shadow: 0 0 0 3px rgba(59, 36, 21, 0.1);
}

/* Button */
.submit-btn {
    margin-top: 28px;
    width: 100%;
    background: #3b2415;
    color: white;
    padding: 14px 20px;
    font-size: 17px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.submit-btn:hover {
    background: #2c1a10;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(59, 36, 21, 0.2);
}

/* Back Link */
.back-link {
    color: #777;
    text-decoration: none;
    font-size: 15px;
}

.back-link:hover {
    color: #3b2415;
    text-decoration: underline;
}
</style>
